<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Livraria Margem</title>

    <link rel="stylesheet" href="../css/style_cadastro.css">
</head>
<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
                <a href="../index.html">
                    <img src="../imagens/logo_atual_oficial.png" alt="Logo da Livraria Margem">
                </a>
            </div>

            <nav id="menu" aria-label="Navegação principal">
                <ul>
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="cadastro.html" aria-current="page">Cadastro</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li>
                        <a href="carrinho.html" class="link-carrinho" aria-label="Abrir carrinho">
                            <img src="../imagens/carrinho.jpg" alt="">
                        </a>
                    </li>
                </ul>
            </nav>
        </header>

        <div id="div-form">

            <h1>Cadastro</h1>

            <form id="form-cadastro">
                <div class="campo">
                    <label for="nome">Nome*</label>
                    <input type="text" id="nome" name="nome" maxlength="15" required placeholder="Digite seu nome...">
                </div>

                <div class="campo">
                    <label for="sobrenome">Sobrenome*</label>
                    <input type="text" id="sobrenome" name="sobrenome" maxlength="60" required placeholder="Digite seu sobrenome...">
                </div>

                <div class="campo">
                    <label for="cpf">CPF*</label>
                    <input type="text" id="cpf" name="cpf" maxlength="14" required placeholder="Digite seu CPF...">
                </div>

                <div class="campo">
                    <label for="telefone">Telefone*</label>
                    <input type="tel" id="telefone" name="telefone" maxlength="11" required placeholder="Digite seu telefone...">
                </div>

                <div class="campo">
                    <label for="email">Email*</label>
                    <input type="email" id="email" name="email" maxlength="60" required placeholder="Digite seu email...">
                </div>

                <div class="campo">
                    <label for="data-nascimento">Data de nascimento*</label>
                    <input type="date" id="data-nascimento" name="data-nascimento" required>
                </div>

                <div class="campo">
                    <label for="cep">CEP*</label>
                    <input type="text" id="cep" name="cep" maxlength="9" required placeholder="Digite seu CEP...">
                </div>

                <div class="campo">
                    <label for="numero">Número*</label>
                    <input type="text" id="numero" name="numero" maxlength="6" required placeholder="Digite o número...">
                </div>

                <div class="campo campo-largo">
                    <label for="logradouro">Logradouro*</label>
                    <input type="text" id="logradouro" name="logradouro" maxlength="60" required placeholder="Digite seu logradouro...">
                </div>

                <div class="campo campo-largo">
                    <label for="complemento">Complemento</label>
                    <input type="text" id="complemento" name="complemento" maxlength="100" placeholder="Digite o complemento...">
                </div>

                <div class="campo">
                    <label for="bairro">Bairro*</label>
                    <input type="text" id="bairro" name="bairro" maxlength="20" required placeholder="Digite seu bairro...">
                </div>

                <div class="campo">
                    <label for="cidade">Cidade*</label>
                    <input type="text" id="cidade" name="cidade" maxlength="20" required placeholder="Digite sua cidade...">
                </div>

                <div class="campo campo-largo">
                    <label for="estado">Estado*</label>
                    <input type="text" id="estado" name="estado" maxlength="60" required placeholder="Digite seu estado...">
                </div>

                <div class="campo">
                    <label for="senha">Senha*</label>

                    <div class="campo-senha">
                        <input
                            type="password"
                            id="senha"
                            name="senha"
                            maxlength="60"
                            required
                            placeholder="Crie sua senha...">

                        <button
                            type="button"
                            class="btn-mostrar-senha"
                            data-campo="senha">
                            Mostrar
                        </button>
                    </div>
                </div>

                <div class="campo">
                    <label for="confirm-senha">Confirmação de senha*</label>

                    <div class="campo-senha">
                        <input
                            type="password"
                            id="confirm-senha"
                            name="confirm-senha"
                            maxlength="60"
                            required
                            placeholder="Confirme sua senha...">

                        <button
                            type="button"
                            class="btn-mostrar-senha"
                            data-campo="confirm-senha">
                            Mostrar
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <footer id="rodape">
            <h2>&copy 2026 Livraria Margem S.A. Todos os direitos resevados</h2>
            <p>Formas de pagamento: Pix, Cartões de Crédito e Débito</p>
        </footer>

    </main>
    <script src ='../js/cadastro.js' defer></script>
</body>
</html>
