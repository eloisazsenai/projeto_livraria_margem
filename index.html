<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Livraria Margem</title>

    <link rel="stylesheet" href="css/style_estrutura_pagina.css">
    <script src="js/produtos.js" type="module" defer></script>
</head>

<body>

        <header id="cabecalho">

            <div id="logo">
                <a href="index.html">
                    <img src="imagens/logo_atual_oficial.png" alt="Logo da Livraria Margem">
                </a>
            </div>

            <nav id="menu" aria-label="Navegação principal">
                <ul>
                    <li><a href="index.html" aria-current="page">Início</a></li>
                    <li><a href="paginas/cadastro.html">Cadastro</a></li>
                    <li><a href="paginas/sobre.html">Sobre</a></li>
                    <li><a href="paginas/login.html">Login</a></li>

                    <li>
                        <a href="paginas/carrinho.html"
                            class="link-carrinho"
                            aria-label="Abrir carrinho">

                            <img src="imagens/carrinho.jpg" alt="">
                            <span id="contador-carrinho">0</span>
                        </a>
                    </li>

                </ul>
            </nav>

        </header>

        <main id="geral">

            <section id="pesquisa">

                <label for="campo-pesquisa" class="sr-only">
                    Pesquisar livros
                </label>

                <input
                    type="search"
                    id="campo-pesquisa"
                    name="pesquisa"
                    class="input-pesquisa"
                    placeholder="Pesquise por título, autor ou seção..."
                    autocomplete="off">
            </section>

            <section id="secoes-produtos">
                <ul id="menu-secoes">
                    <li><a href="#" class="lnk-secao">Seção 01</a></li>
                    <li><a href="#" class="lnk-secao">Seção 02</a></li>
                    <li><a href="#" class="lnk-secao">Seção 03</a></li>
                    <li><a href="#" class="lnk-secao">Seção 04</a></li>
                    <li><a href="#" class="lnk-secao">Seção 05</a></li>
                </ul>
            </section>

            <section id="cards" aria-label="Lista de livros"></section>

        </main>

        <footer id="rodape">

            <h2>&copy; 2026 Livraria Margem S.A. Todos os direitos reservados</h2>

            <p>Formas de pagamento: Pix, Cartões de Crédito e Débito</p>

        </footer>

</body>
</html>
